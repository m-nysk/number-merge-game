<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ナンバーマージ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #1a1a2e;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    touch-action: none;
  }

  /* ===== PC レイアウト（横並び）===== */
  #root {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    gap: 20px;
    min-height: 100vh;
  }
  #ui {
    color: #eee;
    width: 160px;
    padding-top: 10px;
    flex-shrink: 0;
  }
  h1 { font-size: 22px; color: #f0c040; margin-bottom: 16px; }
  .score-box {
    background: #16213e;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 12px;
    text-align: center;
  }
  .score-label { font-size: 12px; color: #888; }
  .score-val { font-size: 28px; font-weight: bold; color: #f0c040; }
  .next-box {
    background: #16213e;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 12px;
    text-align: center;
  }
  .next-label { font-size: 12px; color: #888; margin-bottom: 8px; }
  #next-preview {
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold;
    margin: 0 auto;
  }
  .info { font-size: 12px; color: #666; line-height: 1.6; margin-top: 8px; }
  #btn-restart {
    width: 100%;
    padding: 10px;
    background: #f0c040;
    color: #1a1a2e;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 8px;
  }
  #btn-restart:hover { background: #ffd060; }

  canvas {
    display: block;
    border-radius: 8px;
    cursor: crosshair;
    background: #0f3460;
    border: 2px solid #234;
  }
  #overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    border-radius: 8px;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: white;
    font-size: 28px;
    font-weight: bold;
  }
  #overlay.show { display: flex; }
  #overlay .sub { font-size: 16px; color: #aaa; margin-top: 8px; }
  #game-wrap { position: relative; flex-shrink: 0; }

  /* ===== スマホ レイアウト（縦並び）===== */
  @media (max-width: 600px) {
    html, body { overflow: auto; }
    #root {
      flex-direction: column;
      align-items: center;
      padding: 10px;
      gap: 10px;
      min-height: unset;
    }
    #ui {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr 80px auto;
      align-items: center;
      gap: 8px;
      padding-top: 0;
    }
    h1 { display: none; }
    .score-box { margin-bottom: 0; padding: 8px; }
    .score-val { font-size: 20px; }
    .next-box { margin-bottom: 0; padding: 8px; }
    .info { display: none; }
    #btn-restart {
      margin-top: 0;
      padding: 8px 6px;
      font-size: 12px;
      white-space: nowrap;
    }
    canvas { border-radius: 6px; }
  }
</style>
</head>
<body>

<div id="root">
<div id="ui">
  <h1>🔢 ナンバー<br>マージ</h1>
  <div class="score-box">
    <div class="score-label">スコア</div>
    <div class="score-val" id="score">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">ベスト</div>
    <div class="score-val" id="best">0</div>
  </div>
  <div class="next-box">
    <div class="next-label">NEXT</div>
    <div id="next-preview"></div>
  </div>
  <div class="info">
    同じ数字を<br>ぶつけると合体！<br><br>
    1+1=2<br>2+2=3 ...<br><br>
    上まで積んだら<br>ゲームオーバー
  </div>
  <button id="btn-restart">リスタート</button>
</div>

<div id="game-wrap">
  <canvas id="c" width="360" height="560"></canvas>
  <div id="overlay">
    <div>GAME OVER</div>
    <div class="sub" id="final-score"></div>
    <div class="sub">クリックでリスタート</div>
  </div>
</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 360, H = 560;
canvas.width = W; canvas.height = H;

// レスポンシブ：キャンバスを画面に合わせてCSSスケール
function resizeCanvas() {
  const isMobile = window.innerWidth <= 600;
  if (isMobile) {
    const maxW = window.innerWidth - 20;
    const scale = Math.min(1, maxW / W);
    canvas.style.width  = Math.floor(W * scale) + 'px';
    canvas.style.height = Math.floor(H * scale) + 'px';
  } else {
    const maxH = window.innerHeight - 60;
    const scale = Math.min(1, maxH / H);
    canvas.style.width  = Math.floor(W * scale) + 'px';
    canvas.style.height = Math.floor(H * scale) + 'px';
  }
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// タッチ座標をキャンバス論理座標に変換
function toCanvasX(clientX) {
  const rect = canvas.getBoundingClientRect();
  return (clientX - rect.left) * (W / rect.width);
}
const WALL = 20;
const FLOOR = H - 20;

// Colors for numbers 1-12
const COLORS = [
  null,
  '#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c',
  '#3498db','#9b59b6','#e91e63','#ff5722','#795548',
  '#607d8b','#ffd700'
];
const SIZES = [0, 18, 22, 27, 32, 38, 44, 50, 56, 62, 68, 74, 80];

let balls = [];
let score = 0;
let best = parseInt(localStorage.getItem('nmg_best') || '0');
let gameOver = false;
let curBall = null;
let nextNum = 0;
let dropX = W / 2;
let canDrop = true;
let dropCooldown = 0;
let restartCooldown = 0;
let particles = [];

document.getElementById('best').textContent = best;

function randNum() {
  return Math.floor(Math.random() * 5) + 1;
}

class Ball {
  constructor(x, y, num, vx = 0, vy = 0) {
    this.x = x; this.y = y;
    this.num = num;
    this.r = SIZES[num];
    this.vx = vx; this.vy = vy;
    this.active = true;
    this.merging = false;
    this.alpha = 1;
    this.flash = 0;
    this.age = 0;
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    // Shadow
    ctx.shadowBlur = 10;
    ctx.shadowColor = COLORS[this.num] + '88';
    // Circle
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(
      this.x - this.r * 0.3, this.y - this.r * 0.3, this.r * 0.1,
      this.x, this.y, this.r
    );
    grad.addColorStop(0, lighten(COLORS[this.num], 40));
    grad.addColorStop(1, COLORS[this.num]);
    ctx.fillStyle = grad;
    ctx.fill();
    // Flash on merge
    if (this.flash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${this.flash})`;
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    // Number text
    ctx.fillStyle = 'white';
    ctx.font = `bold ${Math.max(10, this.r * 0.7)}px Segoe UI`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.num, this.x, this.y);
    ctx.restore();
  }
}

function lighten(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (n >> 16) + amt);
  const g = Math.min(255, ((n >> 8) & 0xff) + amt);
  const b = Math.min(255, (n & 0xff) + amt);
  return `rgb(${r},${g},${b})`;
}

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.color = color;
    this.vx = (Math.random() - 0.5) * 6;
    this.vy = (Math.random() - 3) * 4;
    this.life = 1;
    this.r = Math.random() * 5 + 2;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.2;
    this.life -= 0.04;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, color));
  }
}

function initCurrent() {
  nextNum = nextNum || randNum();
  curBall = new Ball(dropX, 40, nextNum);
  nextNum = randNum();
  updateNextPreview();
}

function updateNextPreview() {
  const el = document.getElementById('next-preview');
  el.style.background = COLORS[nextNum];
  el.style.width = el.style.height = SIZES[nextNum] * 2 + 'px';
  el.style.fontSize = Math.max(10, SIZES[nextNum] * 0.7) + 'px';
  el.textContent = nextNum;
}

function drop() {
  if (gameOver || !canDrop || dropCooldown > 0) return;
  curBall.vy = 2;
  balls.push(curBall);
  curBall = null;
  canDrop = false;
  dropCooldown = 35;
}

canvas.addEventListener('mousemove', e => {
  if (gameOver) return;
  dropX = Math.max(WALL + 20, Math.min(W - WALL - 20, toCanvasX(e.clientX)));
  if (curBall) curBall.x = dropX;
});

canvas.addEventListener('click', e => {
  if (gameOver) { restart(); return; }
  if (restartCooldown > 0) return;
  drop();
});

// タッチ操作
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (gameOver) return;
  const t = e.touches[0];
  dropX = Math.max(WALL + 20, Math.min(W - WALL - 20, toCanvasX(t.clientX)));
  if (curBall) curBall.x = dropX;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (gameOver) { restart(); return; }
  if (restartCooldown > 0) return;
  drop();
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); if (!gameOver && restartCooldown === 0) drop(); }
});

document.getElementById('btn-restart').addEventListener('click', restart);
document.getElementById('overlay').addEventListener('click', restart);

function restart() {
  balls = [];
  particles = [];
  score = 0;
  gameOver = false;
  canDrop = true;
  dropCooldown = 0;
  restartCooldown = 30;
  nextNum = randNum();
  document.getElementById('score').textContent = 0;
  document.getElementById('overlay').classList.remove('show');
  initCurrent();
}

function checkCollisions() {
  const n = balls.length;
  for (let i = 0; i < n; i++) {
    const a = balls[i];
    if (!a.active || a.merging) continue;
    for (let j = i + 1; j < n; j++) {
      const b = balls[j];
      if (!b.active || b.merging) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = a.r + b.r;
      if (dist < minDist) {
        if (a.num === b.num && a.num < 12) {
          // Merge!
          const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
          a.active = false; b.active = false;
          a.merging = true; b.merging = true;
          const newNum = a.num + 1;
          const pts = newNum * newNum * 2;
          score += pts;
          document.getElementById('score').textContent = score;
          spawnParticles(mx, my, COLORS[newNum], 15);
          const nb = new Ball(mx, my, newNum, (a.vx + b.vx) * 0.3, -3);
          nb.flash = 0.8;
          balls.push(nb);
        } else {
          // Bounce
          if (dist < 0.001) continue;
          const nx = dx / dist, ny = dy / dist;
          const overlap = minDist - dist;
          a.x -= nx * overlap * 0.5;
          a.y -= ny * overlap * 0.5;
          b.x += nx * overlap * 0.5;
          b.y += ny * overlap * 0.5;
          const rv = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
          if (rv < 0) {
            const imp = rv * 0.55;
            a.vx += imp * nx; a.vy += imp * ny;
            b.vx -= imp * nx; b.vy -= imp * ny;
          }
        }
      }
    }
  }
  balls = balls.filter(b => b.active);
}

function update() {
  if (gameOver) return;
  if (restartCooldown > 0) restartCooldown--;

  if (dropCooldown > 0) {
    dropCooldown--;
    if (dropCooldown === 0) {
      canDrop = true;
      initCurrent();
    }
  }

  const gravity = 0.4;
  const friction = 0.98;

  for (const b of balls) {
    b.vy += gravity;
    b.vx *= friction;
    b.x += b.vx;
    b.y += b.vy;
    b.age++;
    if (b.flash > 0) b.flash -= 0.05;

    // Floor
    if (b.y + b.r > FLOOR) {
      b.y = FLOOR - b.r;
      b.vy *= -0.4;
      b.vx *= 0.85;
    }
    // Walls
    if (b.x - b.r < WALL) {
      b.x = WALL + b.r;
      b.vx *= -0.5;
    }
    if (b.x + b.r > W - WALL) {
      b.x = W - WALL - b.r;
      b.vx *= -0.5;
    }
  }

  checkCollisions();

  particles = particles.filter(p => p.life > 0);
  for (const p of particles) p.update();

  // Game over check (age>90 = settled ball, not freshly dropped)
  for (const b of balls) {
    if (b.age > 90 && b.y - b.r < 70) {
      triggerGameOver();
      return;
    }
  }
}

function triggerGameOver() {
  gameOver = true;
  if (score > best) {
    best = score;
    localStorage.setItem('nmg_best', best);
    document.getElementById('best').textContent = best;
  }
  document.getElementById('final-score').textContent = `スコア: ${score}`;
  document.getElementById('overlay').classList.add('show');
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0f3460');
  bg.addColorStop(1, '#16213e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Danger zone line
  ctx.strokeStyle = 'rgba(231,76,60,0.4)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(WALL, 70); ctx.lineTo(W - WALL, 70);
  ctx.stroke();
  ctx.setLineDash([]);

  // Walls & floor
  ctx.fillStyle = '#234';
  ctx.fillRect(0, 0, WALL, H);
  ctx.fillRect(W - WALL, 0, WALL, H);
  ctx.fillRect(0, FLOOR, W, H - FLOOR);

  // Drop guide line
  if (curBall && !gameOver) {
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(dropX, curBall.y + curBall.r);
    ctx.lineTo(dropX, FLOOR);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Balls
  for (const b of balls) b.draw();

  // Particles
  for (const p of particles) p.draw();

  // Current (held) ball
  if (curBall && !gameOver) curBall.draw();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

nextNum = randNum();
initCurrent();
loop();
</script>
</body>
</html>
